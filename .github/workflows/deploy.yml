name: Portfolio CI/CD

on:
  push:
    branches:
      - main   # runs when you push to main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: false
          fetch-depth: 0

  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: false
          fetch-depth: 0

      # 2. Deploy to Render using deploy hook
      - name: Deploy to production
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d71ir1ggjchc739j4kog?key=gFSQsZlYfTI"
